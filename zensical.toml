[project]
site_name = "hotcoco"
site_url = "https://derekallman.github.io/hotcoco/"
site_description = "A drop-in replacement for pycocotools, 11-26x faster."
repo_url = "https://github.com/derekallman/hotcoco"
repo_name = "derekallman/hotcoco"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quick Start" = "getting-started/quickstart.md" },
    { "Migrating from pycocotools" = "getting-started/migration.md" },
    { "Troubleshooting" = "getting-started/troubleshooting.md" },
  ] },
  { "User Guide" = [
    { "Evaluation" = "guide/evaluation.md" },
    { "Dataset Operations" = "guide/datasets.md" },
    { "Working with Results" = "guide/results.md" },
    { "Mask Operations" = "guide/masks.md" },
    { "PyTorch Integration" = "guide/pytorch.md" },
    { "Plotting" = "guide/plotting.md" },
    { "Dataset Browser" = "guide/browse.md" },
    { "Framework Integrations" = "guide/frameworks.md" },
    { "Tracking Evaluation" = "guide/tracking.md" },
  ] },
  { "API Reference" = [
    { "COCO" = "api/coco.md" },
    { "COCOeval" = "api/cocoeval.md" },
    { "TrackingEval" = "api/tracking.md" },
    { "Params" = "api/params.md" },
    { "mask" = "api/mask.md" },
    { "plot" = "api/plot.md" },
    { "Hierarchy" = "api/hierarchy.md" },
    { "PyTorch Integrations" = "api/integrations.md" },
    { "CLI" = "cli.md" },
  ] },
  { "Performance" = [
    { "Benchmarks" = "benchmarks.md" },
  ] },
]

extra_css = ["stylesheets/extra.css"]

[project.theme]
icon.logo = "lucide/coffee"
features = [
  "content.code.copy",
  "content.tabs.link",
  "navigation.instant",
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.footer",
  "navigation.top",
]

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[project.theme.font]
text = "DM Sans"
code = "JetBrains Mono"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.admonition]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.details]
