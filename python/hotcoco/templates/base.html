<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hotcoco — dataset browser</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥥</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    {% block body %}{% endblock %}
    <div id="error-toast" class="error-toast"></div>
    <script src="/static/overlay.js"></script>
    <script>
    // Stop shimmer animation once thumbnail images load
    document.addEventListener('load', function(e) {
        if (e.target.tagName === 'IMG' && e.target.closest('.thumb-ratio')) {
            e.target.closest('.thumb-ratio').classList.add('loaded');
        }
    }, true);
    </script>
</body>
</html>
